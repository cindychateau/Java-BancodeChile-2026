<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elementos de Texto</title>
  </head>
  <body>
    <h1>Título principal</h1>
    <!-- El más grande, solo uno por página -->
    <h2>Subtítulo</h2>
    <!-- Segundo nivel -->
    <h3>Sub-subtítulo</h3>
    <!-- Tercer nivel (hay hasta h6) -->

    <p>Un párrafo con <strong>negrita</strong> y <em>cursiva</em>.</p>
    <!-- <strong> = negrita con significado semántico "importante" -->
    <!-- <em> = cursiva con significado semántico "énfasis" -->

    <p>
      Texto <mark>resaltado</mark>,
      <!-- Fondo amarillo como marcador -->
      <del>tachado</del>,
      <!-- Texto con línea encima -->
      <small>pequeño</small>,
      <!-- Texto más chico -->
      H<sub>2</sub>O
      <!-- Subíndice: letra abajo (agua) -->
      y x<sup>2</sup>.
      <!-- Superíndice: letra arriba (x al cuadrado) -->
    </p>

    <a href="https://google.com">Enlace a Google</a>
    <!-- <a> = anchor (ancla), crea un enlace -->
    <!-- href = hypertext reference (la dirección del enlace) -->

    <hr />
    <!-- <hr> = horizontal rule, dibuja una línea horizontal. Etiqueta vacía -->

    <p>Línea horizontal arriba ↑</p>
  </body>
</html>
