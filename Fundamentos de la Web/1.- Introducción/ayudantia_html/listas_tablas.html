<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Listas y Tablas</title>
  </head>
  <body>
    <!-- Lista desordenada -->
    <ul>
      <!-- ul = unordered list (puntos •) -->
      <li>Manzana</li>
      <!-- li = list item (cada ítem) -->
      <li>Naranja</li>
      <li>Pera</li>
    </ul>

    <!-- Lista ordenada -->
    <ol>
      <!-- ol = ordered list (números 1,2,3) -->
      <li>Primero</li>
      <li>Segundo</li>
      <li>Tercero</li>
    </ol>

    <!-- Tabla -->
    <table>
      <!-- Contenedor de la tabla -->
      <tr>
        <!-- tr = table row (fila) -->
        <th>Nombre</th>
        <!-- th = table header (encabezado, negrita) -->
        <th>Edad</th>
        <th>Correo</th>
      </tr>
      <tr>
        <td>Ana</td>
        <!-- td = table data (celda normal) -->
        <td>20</td>
        <td>juanita@skillnest.com</td>
      </tr>
      <tr>
        <td>Luis</td>
        <td>22</td>
        <td>
          <ol>
            <li>Primero</li>
            <li>Segundo</li>
            <li>Tercero</li>
          </ol>
        </td>
      </tr>
    </table>
  </body>
</html>
