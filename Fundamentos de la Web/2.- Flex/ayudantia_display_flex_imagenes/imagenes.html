<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Proyecto Imágenes</title>
        <link rel="stylesheet" href="imagenes_estilos.css" />
    </head>
    <body>

        <!-- Caja principal que contiene todo el proyecto -->
        <div class="container">

            <!-- Título de la página -->
            <h1>Proyecto Imágenes</h1>

            <!-- Fila 1: 3 imágenes verticales con fondo naranja -->
            <div class="fila" id="fila-1">
                <img src="https://octodex.github.com/images/original.png" alt="octocat 1" />
                <img src="https://octodex.github.com/images/jetpacktocat.png" alt="octocat 2" />
                <img src="https://octodex.github.com/images/welcometocat.png" alt="octocat 3" />
            </div>

            <!-- Fila 2: 2 imágenes horizontales con fondo verde -->
            <div class="fila" id="fila-2">
                <img src="https://octodex.github.com/images/constructocat2.jpg" alt="octocat 4" />
                <img src="https://octodex.github.com/images/droidtocat.png" alt="octocat 5" />
            </div>

            <!-- Fila 3: 3 imágenes cuadradas con fondo morado -->
            <div class="fila" id="fila-3">
                <img src="https://octodex.github.com/images/dojocat.jpg" alt="octocat 6" />
                <img src="https://octodex.github.com/images/strongbadtocat.png" alt="octocat 7" />
                <img src="https://octodex.github.com/images/spectrocat.png" alt="octocat 8" />
            </div>

            <!-- Fila 4: 4 imágenes pequeñas con fondo rosado -->
            <div class="fila" id="fila-4">
                <img src="https://octodex.github.com/images/labtocat.png" alt="octocat 9" />
                <img src="https://octodex.github.com/images/femalecodertocat.png" alt="octocat 10" />
                <img src="https://octodex.github.com/images/benevocats.jpg" alt="octocat 11" />
                <img src="https://octodex.github.com/images/nyantocat.gif" alt="octocat 12" />
            </div>

            <!-- Pie de página -->
            <footer>Imágenes sacadas de GitHub Octodex</footer>

        </div>

    </body>
</html>
